!
hostname bgw-leaf-2
!
ip routing
!
vrf instance TENANT1
!
ip routing vrf TENANT1
!
service routing protocols model multi-agent
!
! VxLAN interface - L3VNI only, no L2VNI
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT1 vni 50001
   vxlan learn-restrict any
!
! eBGP Underlay + EVPN
router bgp 65006
   router-id 10.1.1.6
   maximum-paths 2 ecmp 2
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   ! Spine-01
   neighbor 10.101.1.11 peer group SPINE
   neighbor 10.101.1.11 remote-as 65000
   neighbor 10.101.1.11 description Spine-01
   ! Spine-02
   neighbor 10.101.2.11 peer group SPINE
   neighbor 10.101.2.11 remote-as 65000
   neighbor 10.101.2.11 description Spine-02
   !
   vrf TENANT1
      rd 10.1.1.6:50001
      route-target import evpn 1:50001
      route-target export evpn 1:50001
      ! eBGP к Mikrotik-RT1 в VRF
      neighbor 100.2.2.1 remote-as 65100
      neighbor 100.2.2.1 description Mikrotik-RT1
      neighbor 100.2.2.1 timers 3 9
      !
      address-family ipv4
         neighbor 100.2.2.1 activate
         redistribute connected
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.1.1.6/32
   !
   address-family evpn
      neighbor SPINE activate
!
interface Ethernet1
   description Link to Spine-01
   no switchport
   ip address 10.101.1.10/31
!
interface Ethernet2
   description Link to Spine-02
   no switchport
   ip address 10.101.2.10/31
!
interface Ethernet3
   description Link to Mikrotik-RT1
   no switchport
   vrf TENANT1
   ip address 100.2.2.0/31
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.1.1.6/32
!
end
