!
hostname bgw-leaf-1
!
ip routing
!
vrf instance TENANT1
!
ip routing vrf TENANT1
!
vrf instance TENANT2
!
ip routing vrf TENANT2
!
service routing protocols model multi-agent
!
! VxLAN interface - L3VNI only, no L2VNI
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT1 vni 50001
   vxlan vrf TENANT2 vni 50002
   vxlan learn-restrict any
!
! eBGP Underlay + EVPN
router bgp 65005
   router-id 10.1.1.5
   maximum-paths 2 ecmp 2
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   ! Spine-01
   neighbor 10.101.1.9 peer group SPINE
   neighbor 10.101.1.9 remote-as 65000
   neighbor 10.101.1.9 description Spine-01
   ! Spine-02
   neighbor 10.101.2.9 peer group SPINE
   neighbor 10.101.2.9 remote-as 65000
   neighbor 10.101.2.9 description Spine-02
   !
   vrf TENANT1
      rd 10.1.1.5:50001
      route-target import evpn 1:50001
      route-target export evpn 1:50001
      ! eBGP к Mikrotik-RT1 в VRF TENANT1
      neighbor 100.1.1.1 remote-as 65100
      neighbor 100.1.1.1 description Mikrotik-RT1-TENANT1
      neighbor 100.1.1.1 timers 3 9
      !
      address-family ipv4
         neighbor 100.1.1.1 activate
         redistribute connected
   !
   vrf TENANT2
      rd 10.1.1.5:50002
      route-target import evpn 2:50002
      route-target export evpn 2:50002
      ! eBGP к Mikrotik-RT1 в VRF TENANT2
      neighbor 100.1.2.1 remote-as 65100
      neighbor 100.1.2.1 description Mikrotik-RT1-TENANT2
      neighbor 100.1.2.1 timers 3 9
      !
      address-family ipv4
         neighbor 100.1.2.1 activate
         redistribute connected
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.1.1.5/32
   !
   address-family evpn
      neighbor SPINE activate
!
interface Ethernet1
   description Link to Spine-01
   no switchport
   ip address 10.101.1.8/31
!
interface Ethernet2
   description Link to Spine-02
   no switchport
   ip address 10.101.2.8/31
!
interface Ethernet3
   description Trunk link to Mikrotik-RT1
   no switchport
!
interface Ethernet3.10
   description TENANT1 transit to Mikrotik-RT1
   encapsulation dot1q vlan 10
   vrf TENANT1
   ip address 100.1.1.0/31
!
interface Ethernet3.20
   description TENANT2 transit to Mikrotik-RT1
   encapsulation dot1q vlan 20
   vrf TENANT2
   ip address 100.1.2.0/31
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.1.1.5/32
!
end
