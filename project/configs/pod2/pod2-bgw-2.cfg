!
hostname pod2-bgw-2
!
ip routing
!
vrf instance TENANT-Y
!
ip routing vrf TENANT-Y
!
service routing protocols model multi-agent
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.2.0.4/32
!
interface Ethernet1
   description pod2-spine-01 Eth6
   no switchport
   ip address 10.2.1.11/31
!
interface Ethernet2
   description pod2-spine-02 Eth6
   no switchport
   ip address 10.2.2.11/31
!
interface Ethernet3
   description interpod-rt-1 GE1/0/3
   no switchport
   vrf TENANT-Y
   ip address 172.16.2.5/31
!
interface Ethernet4
   description interpod-rt-2 GE1/0/3
   no switchport
   vrf TENANT-Y
   ip address 172.16.2.7/31
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-Y vni 50002
   vxlan learn-restrict any
!
router bgp 65526
   router-id 10.2.0.4
   maximum-paths 4 ecmp 4
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.2.1.10 peer group SPINE
   neighbor 10.2.1.10 remote-as 65402
   neighbor 10.2.1.10 description pod2-spine-01
   neighbor 10.2.2.10 peer group SPINE
   neighbor 10.2.2.10 remote-as 65402
   neighbor 10.2.2.10 description pod2-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.2.0.4/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-Y
      rd 10.2.0.4:50002
      route-target import evpn 1:50002
      route-target export evpn 1:50002
      neighbor 172.16.2.4 remote-as 65012
      neighbor 172.16.2.4 local-as 64502 no-prepend replace-as
      neighbor 172.16.2.4 description interpod-rt-1
      neighbor 172.16.2.4 bfd
      neighbor 172.16.2.4 timers 3 9
      neighbor 172.16.2.6 remote-as 65012
      neighbor 172.16.2.6 local-as 64502 no-prepend replace-as
      neighbor 172.16.2.6 description interpod-rt-2
      neighbor 172.16.2.6 bfd
      neighbor 172.16.2.6 timers 3 9
      !
      address-family ipv4
         neighbor 172.16.2.4 activate
         neighbor 172.16.2.6 activate
         redistribute connected
         aggregate-address 10.12.0.0/16

!
end
