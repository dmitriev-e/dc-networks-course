!
hostname pod2-bgw-1
!
ip routing
!
vrf instance TENANT-Y
!
ip routing vrf TENANT-Y
!
service routing protocols model multi-agent
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.2.0.3/32
!
interface Ethernet1
   description pod2-spine-01 Eth5
   no switchport
   ip address 10.2.1.9/31
!
interface Ethernet2
   description pod2-spine-02 Eth5
   no switchport
   ip address 10.2.2.9/31
!
interface Ethernet3
   description interpod-rt-1 GE1/0/2
   no switchport
   vrf TENANT-Y
   ip address 172.16.2.1/31
!
interface Ethernet4
   description interpod-rt-2 GE1/0/2
   no switchport
   vrf TENANT-Y
   ip address 172.16.2.3/31
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-Y vni 50002
   vxlan learn-restrict any
!
router bgp 65525
   router-id 10.2.0.3
   maximum-paths 4 ecmp 4
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.2.1.8 peer group SPINE
   neighbor 10.2.1.8 remote-as 65402
   neighbor 10.2.1.8 description pod2-spine-01
   neighbor 10.2.2.8 peer group SPINE
   neighbor 10.2.2.8 remote-as 65402
   neighbor 10.2.2.8 description pod2-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.2.0.3/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   
   vrf TENANT-Y
      rd 10.2.0.3:50002
      route-target import evpn 1:50002
      route-target export evpn 1:50002
      neighbor 172.16.2.0 remote-as 65012
      neighbor 172.16.2.0 local-as 64502 no-prepend replace-as
      neighbor 172.16.2.0 description interpod-rt-1
      neighbor 172.16.2.0 bfd
      neighbor 172.16.2.0 timers 3 9
      neighbor 172.16.2.2 remote-as 65012
      neighbor 172.16.2.2 local-as 64502 no-prepend replace-as
      neighbor 172.16.2.2 description interpod-rt-2
      neighbor 172.16.2.2 bfd
      neighbor 172.16.2.2 timers 3 9
      !
      address-family ipv4
         neighbor 172.16.2.0 activate
         neighbor 172.16.2.2 activate
         redistribute connected
         aggregate-address 10.12.0.0/16

!
end
