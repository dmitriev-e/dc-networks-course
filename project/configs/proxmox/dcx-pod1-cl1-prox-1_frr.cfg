frr version 10.4.1
frr defaults datacenter
hostname dcx-pod1-cl1-prox-1
log syslog informational
service integrated-vtysh-config
!
route-map MAP_VTEP_IN permit 1
exit
!
route-map MAP_VTEP_OUT permit 1
exit
!
vrf vrf_Zone1
 vni 10000
exit-vrf
!
vrf vrf_Zone2
 vni 20000
exit-vrf
!
vrf vrf_Zone3
 vni 30000
exit-vrf
!
router bgp 65501
 bgp router-id 10.11.0.3
 no bgp hard-administrative-reset
 no bgp default ipv4-unicast
 coalesce-time 1000
 no bgp graceful-restart notification
 neighbor VTEP peer-group
 neighbor VTEP remote-as 65501
 neighbor VTEP bfd
 neighbor 10.11.0.1 peer-group VTEP
 neighbor 10.11.0.5 peer-group VTEP
 !
 address-family l2vpn evpn
  neighbor VTEP activate
  neighbor VTEP route-map MAP_VTEP_IN in
  neighbor VTEP route-map MAP_VTEP_OUT out
  advertise-all-vni
 exit-address-family
exit
!
router bgp 65501 vrf vrf_Zone1
 bgp router-id 10.11.0.3
 no bgp hard-administrative-reset
 no bgp graceful-restart notification
exit
!
router bgp 65501 vrf vrf_Zone2
 bgp router-id 10.11.0.3
 no bgp hard-administrative-reset
 no bgp graceful-restart notification
exit
!
router bgp 65501 vrf vrf_Zone3
 bgp router-id 10.11.0.3
 no bgp hard-administrative-reset
 no bgp graceful-restart notification
exit
!
end
