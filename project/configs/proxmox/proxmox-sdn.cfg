# ==============================================================================
# Notes on BGP session and cross-PoD VM connectivity
# ==============================================================================
#
# BGP session path (PVE -> EVPN-RT, no direct link):
#   PVE bond0 IP (e.g. 10.11.0.3) -> leaf VRF TENANT -> EVPN-RT bond0 (10.11.0.1)
#   Leaf redistributes both /31 connected networks in eBGP sessions to both servers,
#   so each server learns the other's subnet and can reach it transitively.
#
# Zone-prefix announcement path:
#   EVPN-RT (AS 65501) announces 192.168.10.0/23 to hoster leaf (hoster VRF AS 64501)
#   -> EVPN fabric -> BGW -> inter-PoD/core -> other PoDs
#   AS-path at remote PoD: ... [65011] [65012] [64501] [65501]
#
# Cross-PoD VTEP reachability path:
#   PVE-1 lo (e.g. 10.11.20.11) -> EVPN-RT-1 -> leaf (VRF TENANT) -> BGW
#   -> aggregate 10.11.0.0/16 announced to InterPoD/Core
#   -> BGW remote PoD -> leaf -> EVPN-RT -> PVE
#
# Cross-PoD EVPN:
#   EVPN-RTs peer directly via eBGP multihop l2vpn evpn (nexthop unchanged)
#   PoD1 RT1 (10.11.20.1, AS 65501) <-> PoD2 RT1 (10.12.20.1, AS 65502)
#   PoD1 RT1 (10.11.20.1, AS 65501) <-> PoD3 RT1 (10.13.20.1, AS 65503)
#   PoD2 RT1 (10.12.20.1, AS 65502) <-> PoD3 RT1 (10.13.20.1, AS 65503)
