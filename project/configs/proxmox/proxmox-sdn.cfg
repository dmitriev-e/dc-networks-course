# Proxmox Datacenter SDN Configuration
# Applied per-datacenter via /etc/pve/sdn/
# Common across all 3 PoDs — each cluster has its own EVPN controller,
# but shares the same VNI range and zone structure.
#
# Architecture (from OverOverlay EVPN VXLAN fabric diagram):
#   - Each PoD has a separate Zone covering a /23 prefix (2 x /24 VNets)
#   - EVPN-RT announces Zone-prefix (/23) into the hoster fabric
#   - Cross-PoD VTEP reachability via eBGP multihop EVPN between EVPN-RTs
#   - iBGP RR between EVPN-RT and PVE (same ASN within each PoD)
#
# IMPORTANT: Controller "peers" are the EVPN-RT bond0 addresses.
# There is no direct PVE ↔ EVPN-RT link in the lab topology.
# The BGP session is established over the hoster leaf fabric (VRF TENANT):
#   PVE bond0 (e.g. 10.11.0.3) → leaf VRF TENANT → EVPN-RT bond0 (10.11.0.1)

# ==============================================================================
# PoD1 — Cluster 1 (dcX-pod1-pve-1, dcX-pod1-pve-2)
# EVPN-RT-1 bond0 = 10.11.0.1  (reachable from PVE-1 at 10.11.0.3 via leaf)
# EVPN-RT-2 bond0 = 10.11.0.5  (reachable from PVE-2 at 10.11.0.7 via leaf)
# Zone1 prefix: 192.168.10.0/23
# ==============================================================================

# SDN Controller: EVPN BGP controller
# File: /etc/pve/sdn/controllers.cfg
#
# controller: pod1-evpn
#   type: evpn
#   asn: 65501
#   peers: 10.11.0.1,10.11.0.5

# SDN Zone: EVPN zone for PoD1 (Zone1 = 192.168.10.0/23)
# File: /etc/pve/sdn/zones.cfg
#
# zone: pod1-zone1
#   type: evpn
#   controller: pod1-evpn
#   vrf-vxlan: 10001
#   mac: 00:1c:73:10:00:01
#   exitnodes: (none — routing via EVPN-RT)

# SDN VNet: VM networks in PoD1 Zone1
# File: /etc/pve/sdn/vnets.cfg
#
# vnet: pod1-vnet10
#   zone: pod1-zone1
#   tag: 10010
#
# vnet: pod1-vnet11
#   zone: pod1-zone1
#   tag: 10011

# SDN Subnets
# File: /etc/pve/sdn/subnets.cfg
#
# subnet: pod1-vnet10/192.168.10.0/24
#   vnet: pod1-vnet10
#   gateway: 192.168.10.1
#   snat: 0
#   dhcp-range: start-address=192.168.10.10,end-address=192.168.10.250
#
# subnet: pod1-vnet11/192.168.11.0/24
#   vnet: pod1-vnet11
#   gateway: 192.168.11.1
#   snat: 0
#   dhcp-range: start-address=192.168.11.10,end-address=192.168.11.250

# ==============================================================================
# PoD2 — Cluster 2 (dcX-pod2-pve-1, dcX-pod2-pve-2)
# EVPN-RT-1 bond0 = 10.12.0.1  (reachable from PVE-1 at 10.12.0.3 via leaf)
# EVPN-RT-2 bond0 = 10.12.0.5  (reachable from PVE-2 at 10.12.0.7 via leaf)
# Zone2 prefix: 192.168.20.0/23
# ==============================================================================

