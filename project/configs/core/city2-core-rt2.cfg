#
# city2-core-rt2 — Huawei NE40 — AS 65021
# City2/DC-Y Core router (secondary)
# Connects: city2-core-rt1 (iBGP, GE1/0/3), city1-core-rt2 (AS 65011, direct), pod3-bgw-1/2 (AS 64503)
#
# EVE-NG interface map:
#   GE1/0/0 (e1/0/0) — pod3-bgw-1 Eth4
#   GE1/0/1 (e1/0/1) — pod3-bgw-2 Eth4
#   GE1/0/2 (e1/0/2) — not used (vpn-rt-2 in lab, out of scope)
#   GE1/0/3 (e1/0/3) — city2-core-rt1 GE1/0/3 (direct iBGP link)
#   GE1/0/9 (e1/0/9) — city1-core-rt2 GE1/0/9 (direct inter-DC link)
#
sysname city2-core-rt2
#
ip route-static 10.0.0.0 255.0.0.0 NULL0
ip route-static 192.168.0.0 255.255.0.0 NULL0
ip route-static 172.16.0.0 255.240.0.0 NULL0
#
interface LoopBack0
 ip address 172.16.255.6 255.255.255.255
 description Router-ID
#
interface Ethernet1/0/0
 description pod3-bgw-1 Eth4
 ip address 172.16.3.4 255.255.255.254
 undo shutdown
#
interface Ethernet1/0/1
 description pod3-bgw-2 Eth4
 ip address 172.16.3.6 255.255.255.254
 undo shutdown
#
interface Ethernet1/0/3
 description city2-core-rt1 GE1/0/3 (iBGP peer link)
 ip address 172.16.3.9 255.255.255.254
 undo shutdown
#
interface Ethernet1/0/9
 description city1-core-rt2 GE1/0/9 (Inter-DC direct link)
 ip address 172.16.100.7 255.255.255.254
 undo shutdown
#
bgp 65021
 router-id 172.16.255.6
 #
 peer 172.16.3.8 as-number 65021
 peer 172.16.3.8 description city2-core-rt1 (iBGP)
 #
 peer 172.16.100.6 as-number 65011
 peer 172.16.100.6 description city1-core-rt2 (Inter-DC)
 #
 peer 172.16.3.5 as-number 64503
 peer 172.16.3.5 description pod3-bgw-1
 #
 peer 172.16.3.7 as-number 64503
 peer 172.16.3.7 description pod3-bgw-2
 #
 ipv4-family unicast
  undo synchronization
  #
  peer 172.16.3.8 enable
  peer 172.16.3.8 next-hop-local
  #
  peer 172.16.100.6 enable
  peer 172.16.100.6 default-route-advertise
  #
  peer 172.16.3.5 enable
  peer 172.16.3.5 default-route-advertise
  peer 172.16.3.7 enable
  peer 172.16.3.7 default-route-advertise
  #
  import-route direct
  network 172.16.255.6 255.255.255.255
  network 10.0.0.0 255.0.0.0
  network 192.168.0.0 255.255.0.0
  network 172.16.0.0 255.240.0.0
  quit
 #
quit
commit
