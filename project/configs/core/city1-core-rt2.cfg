#
# city1-core-rt2 — Huawei NE40 — AS 65011
# City1/DC-X Core router (secondary)
# Connects: city1-core-rt1 (iBGP, GE1/0/3), interpod-rt-1/2 (AS 65012), city2-core-rt2 (AS 65021, direct)
#
# EVE-NG interface map:
#   GE1/0/0 (e1/0/0) — interpod-rt-1 GE1/0/9
#   GE1/0/1 (e1/0/1) — interpod-rt-2 GE1/0/9
#   GE1/0/2 (e1/0/2) — not used (vpn-rt-1 in lab, out of scope)
#   GE1/0/3 (e1/0/3) — city1-core-rt1 GE1/0/3 (direct iBGP link)
#   GE1/0/9 (e1/0/9) — city2-core-rt2 GE1/0/9 (direct inter-DC link)
#
sysname city1-core-rt2
#
ip route-static 10.0.0.0 255.0.0.0 NULL0
ip route-static 192.168.0.0 255.255.0.0 NULL0
ip route-static 172.16.0.0 255.240.0.0 NULL0
#
interface LoopBack0
 ip address 172.16.255.2 255.255.255.255
 description Router-ID
#
interface Ethernet1/0/0
 description interpod-rt-1 GE1/0/9
 ip address 172.16.10.4 255.255.255.254
 undo shutdown
#
interface Ethernet1/0/1
 description interpod-rt-2 GE1/0/9
 ip address 172.16.10.8 255.255.255.254
 undo shutdown
#
interface Ethernet1/0/3
 description city1-core-rt1 GE1/0/3 (iBGP peer link)
 ip address 172.16.10.11 255.255.255.254
 undo shutdown
#
interface Ethernet1/0/9
 description city2-core-rt2 GE1/0/9 (Inter-DC direct link)
 ip address 172.16.100.6 255.255.255.254
 undo shutdown
#
bgp 65011
 router-id 172.16.255.2
 #
 peer 172.16.10.10 as-number 65011
 peer 172.16.10.10 description city1-core-rt1 (iBGP)
 #
 peer 172.16.10.5 as-number 65012
 peer 172.16.10.5 description interpod-rt-1
 #
 peer 172.16.10.9 as-number 65012
 peer 172.16.10.9 description interpod-rt-2
 #
 peer 172.16.100.7 as-number 65021
 peer 172.16.100.7 description city2-core-rt2 (Inter-DC)
 #
 ipv4-family unicast
  undo synchronization
  #
  peer 172.16.10.10 enable
  peer 172.16.10.10 next-hop-local
  #
  peer 172.16.10.5 enable
  peer 172.16.10.9 enable
  #
  peer 172.16.100.7 enable
  #
  import-route direct
  network 172.16.255.2 255.255.255.255
  network 10.0.0.0 255.0.0.0
  network 192.168.0.0 255.255.0.0
  network 172.16.0.0 255.240.0.0
  quit
 #
quit
commit
