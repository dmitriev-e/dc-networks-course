#
# interpod-rt-2 — Huawei CE12000 — AS 65012
# City1/DC-X Inter-PoD router (rack2)
# Connects: city1-core-rt1/rt2 (AS 65011), pod1-bgw-1/2 (AS 64501), pod2-bgw-1/2 (AS 64502)
#
# EVE-NG interface map:
#   GE1/0/0 (e1/0/0) — pod1-bgw-1 Eth4
#   GE1/0/1 (e1/0/1) — pod1-bgw-2 Eth4
#   GE1/0/2 (e1/0/2) — pod2-bgw-1 Eth4
#   GE1/0/3 (e1/0/3) — pod2-bgw-2 Eth4
#   GE1/0/8 (e1/0/8) — city1-core-rt1 GE1/0/1
#   GE1/0/9 (e1/0/9) — city1-core-rt2 GE1/0/1
#
sysname interpod-rt-2
#
ip ip-prefix TO-POD index 10 permit 10.0.0.0 8
ip ip-prefix TO-POD index 20 permit 192.168.0.0 16
ip ip-prefix TO-POD index 30 permit 172.16.0.0 12
#
route-policy TO-POD permit node 10
 if-match ip-prefix TO-POD
#
interface LoopBack0
 ip address 172.16.255.4 255.255.255.255
 description Router-ID
#
interface GE1/0/0
 description pod1-bgw-1 Eth4
 undo portswitch
 ip address 172.16.1.2 255.255.255.254
 undo shutdown
#
interface GE1/0/1
 description pod1-bgw-2 Eth4
 undo portswitch
 ip address 172.16.1.6 255.255.255.254
 undo shutdown
#
interface GE1/0/2
 description pod2-bgw-1 Eth4
 undo portswitch
 ip address 172.16.2.2 255.255.255.254
 undo shutdown
#
interface GE1/0/3
 description pod2-bgw-2 Eth4
 undo portswitch
 ip address 172.16.2.6 255.255.255.254
 undo shutdown
#
interface GE1/0/8
 description city1-core-rt1 GE1/0/1
 undo portswitch
 ip address 172.16.10.7 255.255.255.254
 undo shutdown
#
interface GE1/0/9
 description city1-core-rt2 GE1/0/1
 undo portswitch
 ip address 172.16.10.9 255.255.255.254
 undo shutdown
#
bgp 65012
 router-id 172.16.255.4
 #
 peer 172.16.10.6 as-number 65011
 peer 172.16.10.6 description city1-core-rt1
 #
 peer 172.16.10.8 as-number 65011
 peer 172.16.10.8 description city1-core-rt2
 #
 peer 172.16.1.3 as-number 64501
 peer 172.16.1.3 description pod1-bgw-1
 #
 peer 172.16.1.7 as-number 64501
 peer 172.16.1.7 description pod1-bgw-2
 #
 peer 172.16.2.3 as-number 64502
 peer 172.16.2.3 description pod2-bgw-1
 #
 peer 172.16.2.7 as-number 64502
 peer 172.16.2.7 description pod2-bgw-2
 #
 ipv4-family unicast
  #
  peer 172.16.10.6 enable
  peer 172.16.10.8 enable
  #
  peer 172.16.1.3 enable
  peer 172.16.1.3 route-policy TO-POD export
  peer 172.16.1.7 enable
  peer 172.16.1.7 route-policy TO-POD export
  peer 172.16.2.3 enable
  peer 172.16.2.3 route-policy TO-POD export
  peer 172.16.2.7 enable
  peer 172.16.2.7 route-policy TO-POD export
  #
  import-route direct
  network 172.16.255.4 255.255.255.255
  quit
 #
quit
commit
