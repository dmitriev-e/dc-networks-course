#
# interpod-rt-1 — Huawei CE12000 — AS 65012
# City1/DC-X Inter-PoD router (rack1)
# Connects: city1-core-rt1/rt2 (AS 65011), pod1-bgw-1/2 (AS 64501), pod2-bgw-1/2 (AS 64502)
#
# EVE-NG interface map:
#   GE1/0/0 (e1/0/0) — pod1-bgw-1 Eth3
#   GE1/0/1 (e1/0/1) — pod1-bgw-2 Eth3
#   GE1/0/2 (e1/0/2) — pod2-bgw-1 Eth3
#   GE1/0/3 (e1/0/3) — pod2-bgw-2 Eth3
#   GE1/0/8 (e1/0/8) — city1-core-rt1 GE1/0/0
#   GE1/0/9 (e1/0/9) — city1-core-rt2 GE1/0/0
#
# BGW подключены как per-PoD AS: pod1-bgw = AS 64501, pod2-bgw = AS 64502.
# AS 64501/64502 присутствуют в AS-path маршрутов от хостера.
#
sysname interpod-rt-1
#
ip ip-prefix TO-POD index 10 permit 10.0.0.0 8
ip ip-prefix TO-POD index 20 permit 192.168.0.0 16
ip ip-prefix TO-POD index 30 permit 172.16.0.0 12
#
route-policy TO-POD permit node 10
 if-match ip-prefix TO-POD
#
interface LoopBack0
 ip address 172.16.255.3 255.255.255.255
 description Router-ID
#
interface GE1/0/0
 description pod1-bgw-1 Eth3
 undo portswitch
 ip address 172.16.1.0 255.255.255.254
 undo shutdown
#
interface GE1/0/1
 description pod1-bgw-2 Eth3
 undo portswitch
 ip address 172.16.1.4 255.255.255.254
 undo shutdown
#
interface GE1/0/2
 description pod2-bgw-1 Eth3
 undo portswitch
 ip address 172.16.2.0 255.255.255.254
 undo shutdown
#
interface GE1/0/3
 description pod2-bgw-2 Eth3
 undo portswitch
 ip address 172.16.2.4 255.255.255.254
 undo shutdown
#
interface GE1/0/8
 description city1-core-rt1 GE1/0/0
 undo portswitch
 ip address 172.16.10.3 255.255.255.254
 undo shutdown
#
interface GE1/0/9
 description city1-core-rt2 GE1/0/0
 undo portswitch
 ip address 172.16.10.5 255.255.255.254
 undo shutdown
#
bgp 65012
 router-id 172.16.255.3
 #
 peer 172.16.10.2 as-number 65011
 peer 172.16.10.2 description city1-core-rt1
 #
 peer 172.16.10.4 as-number 65011
 peer 172.16.10.4 description city1-core-rt2
 #
 peer 172.16.1.1 as-number 64501
 peer 172.16.1.1 description pod1-bgw-1
 #
 peer 172.16.1.5 as-number 64501
 peer 172.16.1.5 description pod1-bgw-2
 #
 peer 172.16.2.1 as-number 64502
 peer 172.16.2.1 description pod2-bgw-1
 #
 peer 172.16.2.5 as-number 64502
 peer 172.16.2.5 description pod2-bgw-2
 #
 ipv4-family unicast
  #
  peer 172.16.10.2 enable
  peer 172.16.10.4 enable
  #
  peer 172.16.1.1 enable
  peer 172.16.1.1 route-policy TO-POD export
  peer 172.16.1.5 enable
  peer 172.16.1.5 route-policy TO-POD export
  peer 172.16.2.1 enable
  peer 172.16.2.1 route-policy TO-POD export
  peer 172.16.2.5 enable
  peer 172.16.2.5 route-policy TO-POD export
  #
  import-route direct
  network 172.16.255.3 255.255.255.255
  quit
 #
quit
commit
