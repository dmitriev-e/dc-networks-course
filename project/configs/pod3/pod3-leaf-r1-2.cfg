!
hostname pod3-leaf-r1-2
!
ip routing
!
vrf instance TENANT-Z
!
ip routing vrf TENANT-Z
!
ip virtual-router mac-address 00:1c:73:03:00:00
!
service routing protocols model multi-agent
!
! VLANs for server ESI-LAG (local L2, no L2VNI — only L3VNI routing)
vlan 310
   name POD3-R1-EVPNRT
!
vlan 311
   name POD3-R1-PVE
!
! SVI — EVPN-RT (PC2): anycast gateway
interface Vlan310
   description dcY-pod3-evpn-rt-1 gateway
   vrf TENANT-Z
   ip address virtual 10.13.0.0/31
!
! SVI — PVE anycast gateway (PC1)
interface Vlan311
   description dcY-pod3-pve-1 gateway
   vrf TENANT-Z
   ip address virtual 10.13.0.2/31
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.3.0.12/32
!
interface Ethernet1
   description pod3-spine-01 Eth2
   no switchport
   ip address 10.3.1.3/31
!
interface Ethernet2
   description pod3-spine-02 Eth2
   no switchport
   ip address 10.3.2.3/31
!
! Eth3 — PVE ESI-LAG member
interface Ethernet3
   description dcY-pod3-pve-1 bond0 (ESI-LAG PC1)
   channel-group 1 mode active
!
! Eth4 — EVPN-RT ESI-LAG member
interface Ethernet4
   description dcY-pod3-evpn-rt-1 bond0 (ESI-LAG PC2)
   channel-group 2 mode active
!
! PC1 — PVE, L2 ESI-LAG access VLAN 311
interface Port-Channel1
   description dcY-pod3-pve-1 ESI-LAG
   switchport
   switchport access vlan 311
   !
   evpn ethernet-segment
      identifier 0000:0000:0003:0001:0002
      route-target import 00:00:03:00:01:02
   lacp system-id 0000.0300.0102
!
! PC2 — EVPN-RT, L2 ESI-LAG access VLAN 310
interface Port-Channel2
   description dcY-pod3-evpn-rt-1 ESI-LAG
   switchport
   switchport access vlan 310
   !
   evpn ethernet-segment
      identifier 0000:0000:0003:0001:0001
      route-target import 00:00:03:00:01:01
   lacp system-id 0000.0300.0101
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-Z vni 50003
   vxlan learn-restrict any
!
no router bgp 65532
!
!
!
router bgp 65532
   router-id 10.3.0.12
   maximum-paths 2 ecmp 2
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.3.1.2 peer group SPINE
   neighbor 10.3.1.2 remote-as 65403
   neighbor 10.3.1.2 description pod3-spine-01
   neighbor 10.3.2.2 peer group SPINE
   neighbor 10.3.2.2 remote-as 65403
   neighbor 10.3.2.2 description pod3-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.3.0.12/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-Z
      rd 10.3.0.12:50003
      route-target import evpn 1:50003
      route-target export evpn 1:50003
      !
      address-family ipv4
         redistribute connected
!
end
