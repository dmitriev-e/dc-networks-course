!
hostname pod3-bgw-2
!
ip routing
!
vrf instance TENANT-Z
!
ip routing vrf TENANT-Z
!
service routing protocols model multi-agent
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.3.0.4/32
!
interface Ethernet1
   description pod3-spine-01 Eth6
   no switchport
   ip address 10.3.1.11/31
!
interface Ethernet2
   description pod3-spine-02 Eth6
   no switchport
   ip address 10.3.2.11/31
!
interface Ethernet3
   description city2-core-rt1 GE1/0/1
   no switchport
   vrf TENANT-Z
   ip address 172.16.3.3/31
!
interface Ethernet4
   description city2-core-rt2 GE1/0/1
   no switchport
   vrf TENANT-Z
   ip address 172.16.3.7/31
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-Z vni 50003
   vxlan learn-restrict any
!
router bgp 65536
   router-id 10.3.0.4
   maximum-paths 4 ecmp 4
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.3.1.10 peer group SPINE
   neighbor 10.3.1.10 remote-as 65403
   neighbor 10.3.1.10 description pod3-spine-01
   neighbor 10.3.2.10 peer group SPINE
   neighbor 10.3.2.10 remote-as 65403
   neighbor 10.3.2.10 description pod3-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.3.0.4/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-Z
      rd 10.3.0.4:50003
      route-target import evpn 1:50003
      route-target export evpn 1:50003
      neighbor 172.16.3.2 remote-as 65021
      neighbor 172.16.3.2 local-as 64503 no-prepend replace-as
      neighbor 172.16.3.2 description city2-core-rt1
      neighbor 172.16.3.2 bfd
      neighbor 172.16.3.2 timers 3 9
      neighbor 172.16.3.6 remote-as 65021
      neighbor 172.16.3.6 local-as 64503 no-prepend replace-as
      neighbor 172.16.3.6 description city2-core-rt2
      neighbor 172.16.3.6 bfd
      neighbor 172.16.3.6 timers 3 9
      !
      address-family ipv4
         neighbor 172.16.3.2 activate
         neighbor 172.16.3.6 activate
         redistribute connected
         aggregate-address 10.13.0.0/16
!
end
