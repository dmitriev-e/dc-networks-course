!
hostname pod3-bgw-1
!
ip routing
!
vrf instance TENANT-Z
!
ip routing vrf TENANT-Z
!
service routing protocols model multi-agent
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.3.0.3/32
!
interface Ethernet1
   description pod3-spine-01 Eth5
   no switchport
   ip address 10.3.1.9/31
!
interface Ethernet2
   description pod3-spine-02 Eth5
   no switchport
   ip address 10.3.2.9/31
!
! PoD3 BGW подключен к city2-core (не к interpod-rt)
interface Ethernet3
   description city2-core-rt1 GE1/0/0
   no switchport
   vrf TENANT-Z
   ip address 172.16.3.1/31
!
interface Ethernet4
   description city2-core-rt2 GE1/0/0
   no switchport
   vrf TENANT-Z
   ip address 172.16.3.5/31
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-Z vni 50003
   vxlan learn-restrict any
!
router bgp 65535
   router-id 10.3.0.3
   maximum-paths 4 ecmp 4
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.3.1.8 peer group SPINE
   neighbor 10.3.1.8 remote-as 65403
   neighbor 10.3.1.8 description pod3-spine-01
   neighbor 10.3.2.8 peer group SPINE
   neighbor 10.3.2.8 remote-as 65403
   neighbor 10.3.2.8 description pod3-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.3.0.3/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-Z
      rd 10.3.0.3:50003
      route-target import evpn 1:50003
      route-target export evpn 1:50003
      ! eBGP к city2-core — представляемся как AS 64503 (хостерский VRF per-PoD)
      neighbor 172.16.3.0 remote-as 65021
      neighbor 172.16.3.0 local-as 64503 no-prepend replace-as
      neighbor 172.16.3.0 description city2-core-rt1
      neighbor 172.16.3.0 bfd
      neighbor 172.16.3.0 timers 3 9
      neighbor 172.16.3.4 remote-as 65021
      neighbor 172.16.3.4 local-as 64503 no-prepend replace-as
      neighbor 172.16.3.4 description city2-core-rt2
      neighbor 172.16.3.4 bfd
      neighbor 172.16.3.4 timers 3 9
      !
      address-family ipv4
         neighbor 172.16.3.0 activate
         neighbor 172.16.3.4 activate
         redistribute connected
         aggregate-address 10.13.0.0/16
!
end
