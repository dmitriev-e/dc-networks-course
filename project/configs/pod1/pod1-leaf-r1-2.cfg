!
hostname pod1-leaf-r1-2
!
ip routing
!
vrf instance TENANT-X
!
ip routing vrf TENANT-X
!
ip virtual-router mac-address 00:1c:73:01:00:00
!
service routing protocols model multi-agent
!
! VLANs for server ESI-LAG (local L2, no L2VNI — only L3VNI routing)
vlan 110
   name POD1-R1-EVPNRT
!
vlan 111
   name POD1-R1-PVE
!
! SVI — EVPN-RT (PC2): anycast gateway
interface Vlan110
   description dcX-pod1-evpn-rt-1 gateway
   vrf TENANT-X
   ip address virtual 10.11.0.0/31
!
! SVI — PVE anycast gateway (PC1)
interface Vlan111
   description dcX-pod1-pve-1 gateway
   vrf TENANT-X
   ip address virtual 10.11.0.2/31
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.1.0.12/32
!
interface Ethernet1
   description pod1-spine-01 Eth2
   no switchport
   ip address 10.1.1.3/31
!
interface Ethernet2
   description pod1-spine-02 Eth2
   no switchport
   ip address 10.1.2.3/31
!
! Eth3 — PVE ESI-LAG member
interface Ethernet3
   description dcX-pod1-pve-1 bond0 (ESI-LAG PC1)
   channel-group 1 mode active
!
! Eth4 — EVPN-RT ESI-LAG member
interface Ethernet4
   description dcX-pod1-evpn-rt-1 bond0 (ESI-LAG PC2)
   channel-group 2 mode active
!
! PC1 — PVE, L2 ESI-LAG access VLAN 111
interface Port-Channel1
   description dcX-pod1-pve-1 ESI-LAG
   switchport
   switchport access vlan 111
   !
   evpn ethernet-segment
      identifier 0000:0000:0001:0001:0002
      route-target import 00:00:01:00:01:02
   lacp system-id 0000.0100.0102
!
! PC2 — EVPN-RT, L2 ESI-LAG access VLAN 110
interface Port-Channel2
   description dcX-pod1-evpn-rt-1 ESI-LAG
   switchport
   switchport access vlan 110
   !
   evpn ethernet-segment
      identifier 0000:0000:0001:0001:0001
      route-target import 00:00:01:00:01:01
   lacp system-id 0000.0100.0101
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-X vni 50001
   vxlan learn-restrict any
!
no router bgp 65512
!
!
!
router bgp 65512
   router-id 10.1.0.12
   maximum-paths 2 ecmp 2
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.1.1.2 peer group SPINE
   neighbor 10.1.1.2 remote-as 65401
   neighbor 10.1.1.2 description pod1-spine-01
   neighbor 10.1.2.2 peer group SPINE
   neighbor 10.1.2.2 remote-as 65401
   neighbor 10.1.2.2 description pod1-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.1.0.12/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-X
      rd 10.1.0.12:50001
      route-target import evpn 1:50001
      route-target export evpn 1:50001
      !
      address-family ipv4
         redistribute connected
!
end
