!
hostname pod1-bgw-1
!
ip routing
!
vrf instance TENANT-X
!
ip routing vrf TENANT-X
!
service routing protocols model multi-agent
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.1.0.3/32
!
interface Ethernet1
   description pod1-spine-01 Eth5
   no switchport
   ip address 10.1.1.9/31
!
interface Ethernet2
   description pod1-spine-02 Eth5
   no switchport
   ip address 10.1.2.9/31
!
! Eth3/Eth4 in VRF TENANT — eBGP к interpod-rt (хостерский VRF AS 64501)
interface Ethernet3
   description interpod-rt-1 GE1/0/0
   no switchport
   vrf TENANT-X
   ip address 172.16.1.1/31
!
interface Ethernet4
   description interpod-rt-2 GE1/0/0
   no switchport
   vrf TENANT-X
   ip address 172.16.1.3/31
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-X vni 50001
   vxlan learn-restrict any
!
router bgp 65515
   router-id 10.1.0.3
   maximum-paths 4 ecmp 4
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.1.1.8 peer group SPINE
   neighbor 10.1.1.8 remote-as 65401
   neighbor 10.1.1.8 description pod1-spine-01
   neighbor 10.1.2.8 peer group SPINE
   neighbor 10.1.2.8 remote-as 65401
   neighbor 10.1.2.8 description pod1-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.1.0.3/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-X
      rd 10.1.0.3:50001
      route-target import evpn 1:50001
      route-target export evpn 1:50001
      ! eBGP к interpod-rt — представляемся как AS 64501 (хостерский VRF per-PoD)
      neighbor 172.16.1.0 remote-as 65012
      neighbor 172.16.1.0 local-as 64501 no-prepend replace-as
      neighbor 172.16.1.0 description interpod-rt-1
      neighbor 172.16.1.0 bfd
      neighbor 172.16.1.0 timers 3 9
      neighbor 172.16.1.2 remote-as 65012
      neighbor 172.16.1.2 local-as 64501 no-prepend replace-as
      neighbor 172.16.1.2 description interpod-rt-2
      neighbor 172.16.1.2 bfd
      neighbor 172.16.1.2 timers 3 9
      !
      address-family ipv4
         neighbor 172.16.1.0 activate
         neighbor 172.16.1.2 activate
         redistribute connected
         aggregate-address 10.11.0.0/16
!

end
