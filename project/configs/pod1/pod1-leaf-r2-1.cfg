!
hostname pod1-leaf-r2-1
!
ip routing
!
vrf instance TENANT-X
!
ip routing vrf TENANT-X
!
ip virtual-router mac-address 00:1c:73:01:00:00
!
service routing protocols model multi-agent
!
! VLANs for server ESI-LAG (local L2, no L2VNI — only L3VNI routing)
vlan 120
   name POD1-R2-EVPNRT
!
vlan 121
   name POD1-R2-PVE
!
! SVI — EVPN-RT (PC2): anycast gateway
interface Vlan120
   description dcX-pod1-evpn-rt-2 gateway
   vrf TENANT-X
   ip address virtual 10.11.0.4/31
!
! SVI — PVE anycast gateway (PC1)
interface Vlan121
   description dcX-pod1-pve-2 gateway
   vrf TENANT-X
   ip address virtual 10.11.0.6/31
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.1.0.21/32
!
interface Ethernet1
   description pod1-spine-01 Eth3
   no switchport
   ip address 10.1.1.5/31
!
interface Ethernet2
   description pod1-spine-02 Eth3
   no switchport
   ip address 10.1.2.5/31
!
! Eth3 — PVE ESI-LAG member
interface Ethernet3
   description dcX-pod1-pve-2 bond0 (ESI-LAG PC1)
   channel-group 1 mode active
!
! Eth4 — EVPN-RT ESI-LAG member
interface Ethernet4
   description dcX-pod1-evpn-rt-2 bond0 (ESI-LAG PC2)
   channel-group 2 mode active
!
! PC1 — PVE, L2 ESI-LAG access VLAN 121
interface Port-Channel1
   description dcX-pod1-pve-2 ESI-LAG
   switchport
   switchport access vlan 121
   !
   evpn ethernet-segment
      identifier 0000:0000:0001:0002:0002
      route-target import 00:00:01:00:02:02
   lacp system-id 0000.0100.0202
!
! PC2 — EVPN-RT, L2 ESI-LAG access VLAN 120
interface Port-Channel2
   description dcX-pod1-evpn-rt-2 ESI-LAG
   switchport
   switchport access vlan 120
   !
   evpn ethernet-segment
      identifier 0000:0000:0001:0002:0001
      route-target import 00:00:01:00:02:01
   lacp system-id 0000.0100.0201
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-X vni 50001
   vxlan learn-restrict any
!
no router bgp 65513
!
!
!
router bgp 65513
   router-id 10.1.0.21
   maximum-paths 2 ecmp 2
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.1.1.4 peer group SPINE
   neighbor 10.1.1.4 remote-as 65401
   neighbor 10.1.1.4 description pod1-spine-01
   neighbor 10.1.2.4 peer group SPINE
   neighbor 10.1.2.4 remote-as 65401
   neighbor 10.1.2.4 description pod1-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.1.0.21/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-X
      rd 10.1.0.21:50001
      route-target import evpn 1:50001
      route-target export evpn 1:50001
      !
      address-family ipv4
         redistribute connected
!
end
