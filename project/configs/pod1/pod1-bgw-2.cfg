!
hostname pod1-bgw-2
!
ip routing
!
vrf instance TENANT-X
!
ip routing vrf TENANT-X
!
service routing protocols model multi-agent
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.1.0.4/32
!
interface Ethernet1
   description pod1-spine-01 Eth6
   no switchport
   ip address 10.1.1.11/31
!
interface Ethernet2
   description pod1-spine-02 Eth6
   no switchport
   ip address 10.1.2.11/31
!
interface Ethernet3
   description interpod-rt-1 GE1/0/1
   no switchport
   vrf TENANT-X
   ip address 172.16.1.5/31
!
interface Ethernet4
   description interpod-rt-2 GE1/0/1
   no switchport
   vrf TENANT-X
   ip address 172.16.1.7/31
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vrf TENANT-X vni 50001
   vxlan learn-restrict any
!
router bgp 65516
   router-id 10.1.0.4
   maximum-paths 4 ecmp 4
   neighbor SPINE peer group
   neighbor SPINE bfd
   neighbor SPINE timers 3 9
   neighbor SPINE send-community extended
   neighbor 10.1.1.10 peer group SPINE
   neighbor 10.1.1.10 remote-as 65401
   neighbor 10.1.1.10 description pod1-spine-01
   neighbor 10.1.2.10 peer group SPINE
   neighbor 10.1.2.10 remote-as 65401
   neighbor 10.1.2.10 description pod1-spine-02
   !
   address-family ipv4
      neighbor SPINE activate
      network 10.1.0.4/32
   !
   address-family evpn
      neighbor SPINE activate
   !
   vrf TENANT-X
      rd 10.1.0.4:50001
      route-target import evpn 1:50001
      route-target export evpn 1:50001
      neighbor 172.16.1.4 remote-as 65012
      neighbor 172.16.1.4 local-as 64501 no-prepend replace-as
      neighbor 172.16.1.4 description interpod-rt-1
      neighbor 172.16.1.4 bfd
      neighbor 172.16.1.4 timers 3 9
      neighbor 172.16.1.6 remote-as 65012
      neighbor 172.16.1.6 local-as 64501 no-prepend replace-as
      neighbor 172.16.1.6 description interpod-rt-2
      neighbor 172.16.1.6 bfd
      neighbor 172.16.1.6 timers 3 9
      !
      address-family ipv4
         neighbor 172.16.1.4 activate
         neighbor 172.16.1.6 activate
         redistribute connected
         aggregate-address 10.11.0.0/16
!

end
