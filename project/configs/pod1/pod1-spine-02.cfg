!
hostname pod1-spine-02
!
ip routing
!
service routing protocols model multi-agent
!
interface Loopback0
   description Router-ID / VTEP
   ip address 10.1.0.2/32
!
interface Ethernet1
   description pod1-leaf-r1-1 Eth2
   no switchport
   ip address 10.1.2.0/31
!
interface Ethernet2
   description pod1-leaf-r1-2 Eth2
   no switchport
   ip address 10.1.2.2/31
!
interface Ethernet3
   description pod1-leaf-r2-1 Eth2
   no switchport
   ip address 10.1.2.4/31
!
interface Ethernet4
   description pod1-leaf-r2-2 Eth2
   no switchport
   ip address 10.1.2.6/31
!
interface Ethernet5
   description pod1-bgw-1 Eth2
   no switchport
   ip address 10.1.2.8/31
!
interface Ethernet6
   description pod1-bgw-2 Eth2
   no switchport
   ip address 10.1.2.10/31
!
no router bgp 65501
!
!
!
router bgp 65401
   router-id 10.1.0.2
   maximum-paths 6 ecmp 6
   neighbor LEAF peer group
   neighbor LEAF bfd
   neighbor LEAF timers 3 9
   neighbor LEAF send-community extended
   neighbor 10.1.2.1 peer group LEAF
   neighbor 10.1.2.1 remote-as 65511
   neighbor 10.1.2.1 description pod1-leaf-r1-1
   neighbor 10.1.2.3 peer group LEAF
   neighbor 10.1.2.3 remote-as 65512
   neighbor 10.1.2.3 description pod1-leaf-r1-2
   neighbor 10.1.2.5 peer group LEAF
   neighbor 10.1.2.5 remote-as 65513
   neighbor 10.1.2.5 description pod1-leaf-r2-1
   neighbor 10.1.2.7 peer group LEAF
   neighbor 10.1.2.7 remote-as 65514
   neighbor 10.1.2.7 description pod1-leaf-r2-2
   neighbor 10.1.2.9 peer group LEAF
   neighbor 10.1.2.9 remote-as 65515
   neighbor 10.1.2.9 description pod1-bgw-1
   neighbor 10.1.2.11 peer group LEAF
   neighbor 10.1.2.11 remote-as 65516
   neighbor 10.1.2.11 description pod1-bgw-2
   !
   address-family ipv4
      neighbor LEAF activate
      network 10.1.0.2/32
   !
   address-family evpn
      neighbor LEAF activate
      neighbor LEAF next-hop-unchanged
!
end
